# ============================================================
# FILE: .github/workflows/snake.yml
# PURPOSE: Auto-generates the snake contribution animation
#          and commits it to the `output` branch.
#
# SETUP INSTRUCTIONS:
#  1. Create repo: github.com/soumen827/soumen827 (same name as username)
#  2. Create this file at: .github/workflows/snake.yml
#  3. Go to Settings → Actions → General → enable "Read and write permissions"
#  4. Run the workflow manually once, then it runs daily at midnight
#  5. After first run, uncomment the snake SVG line in README.md
# ============================================================

name: Generate Snake Animation

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Generate the snake SVG animation
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: soumen827
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 3: Push the generated SVG to the `output` branch
      - name: Push Snake SVG to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
