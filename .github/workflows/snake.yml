# ============================================================
# FILE: .github/workflows/snake.yml
# FIXES:
#   - actions/checkout@v2 → v4  (fixes Node.js 20 deprecation)
#   - ghaction-github-pages@v3  → v4  (fixes set-output error)
#   - Added: permissions: contents: write  (ensures push works)
# ============================================================

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write       # ← REQUIRED: allows pushing to output branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4          # ← FIXED: was @v2

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push SVG to Output Branch
        uses: crazy-max/ghaction-github-pages@v4  # ← FIXED: was @v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
